car_id: car_001
stream_id: camera_front
cloud_host: 192.168.175.90
cloud_port: 8000
cloud_discovery_enabled: false
cloud_discovery_port: 8765
cloud_discovery_listen_seconds: 2.0
cloud_discovery_service: JetCarCloud
algorithm_ids: []
cloud_url: ""
camera_topic: /camera/color/image_raw
scan_topic: /scan
imu_topic: /imu/data
ai_enable_topic: /jetcar/ai_enable
algorithm_control_topic: /jetcar/algorithm_ids
app_control_host: 0.0.0.0
app_control_port: 0
task_control_host: 0.0.0.0
task_control_port: 6002
frame_server_host: 0.0.0.0
frame_server_port: 8100
snapshot_topic: /jetcar/snapshot
ai_result_topic: /jetcar/ai_result
emergency_stop_topic: /jetcar/emergency_stop
cmd_vel_topic: /cmd_vel
task_status_topic: /jetcar/task_status
upload_fps: 5.0
image_width: 640
jpeg_quality: 70
queue_size: 2
danger_distance_m: 1.5
reconnect_seconds: 2.0
docker_orchestrator_enabled: false
docker_executable: docker
docker_command_prefix: ""
autodrive_container: jetcar_auto
# These commands come from the Jetson manual and may need adjustment on the real
# car. Verify package names, workspace setup scripts, and topics inside the
# container before enabling docker_orchestrator_enabled.
similarity_search_programs:
  - ros2 run yahboomcar_bringup Mcnamu_driver_X3
  - ros2 launch sllidar_ros2 sllidar_launch.py
  - ros2 launch astra_camera astra.launch.xml
# Optional manual programs, not enabled by default:
# - ros2 run yahboomcar_laser laser_Avoidance_a1_X3
# - ros2 run yahboomcar_astra colorHSV
# - ros2 run yahboomcar_astra colorTracker
similarity_match_threshold: 0.70
similarity_track_confirm_frames: 2
similarity_found_confirm_frames: 2
similarity_found_center_tolerance: 0.16
similarity_auto_stop_on_match: true
similarity_motion_enabled: true
similarity_align_tolerance: 0.12
similarity_target_stop_distance_m: 1.0
similarity_safety_stop_distance_m: 0.35
similarity_target_stop_bbox_area: 0.28
similarity_lost_timeout_seconds: 3.0
similarity_step_search_enabled: true
similarity_search_angular_z: 0.60
similarity_search_step_degrees: 45.0
similarity_search_step_jitter_degrees: 10.0
similarity_search_forward_after_degrees: 330.0
similarity_search_forward_linear_x: 0.08
similarity_search_forward_seconds: 0.8
similarity_search_settle_seconds: 0.45
similarity_search_result_timeout_seconds: 2.5
similarity_align_angular_gain: 0.8
similarity_approach_linear_x: 0.08
similarity_cautious_approach_linear_x: 0.045
similarity_approach_step_seconds: 0.45
similarity_approach_angular_gain: 0.45

# Road inspection is demo-first: drive forward slowly with a small sway,
# count effective YOLO result frames, and stop after enough results.
inspection_motion_enabled: true
inspection_target_count: 3
inspection_linear_x: 0.07
inspection_angular_z: 0.10
inspection_sway_seconds: 1.8
inspection_result_cooldown_seconds: 1.4
inspection_detection_min_confidence: 0.25
inspection_safety_stop_distance_m: 0.35
inspection_obstacle_turn_angular_z: 0.35
